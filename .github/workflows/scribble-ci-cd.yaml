# ===================================
# Scribble - DevSecOps CI/CD pipeline
# ===================================

# Stages: Lint --> SCA --> Build --> Docker image scan --> IaC scan --> Manifest file update

name: Scribble DevSecOps pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# Restrict default permissions to read only

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/scribble-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/scribble-frontend

jobs:

# STAGE 1: Linting

  lint: # job id (used internally by github actions)
    name: "Lint code" # display name (shown in github ui)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint

# STAGE 2: SCA
  
  sca:
    name: "sca dependency audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: npm audit # npm audit for known vulnerabilities
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true # to not on fail on moderate

# STAGE 3: To build & push images

  build:
    name: "build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write # to push to ghcr
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/scribble-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Security: provenance and SBOM
          provenance: true
          sbom: true
          # Provenance (provenance: true) adds verifiable metadata about how and where the Docker image was built, helping ensure the build process is trustworthy and hasn’t been tampered with.
          # SBOM (sbom: true) generates a detailed list of all packages and dependencies inside the image, which is useful for vulnerability scanning and compliance checks.

# STAGE 4: Trivy - Container image scanning
  image-scan:
    name: "scan ${{ matrix.component }} image"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: build image for scanning
        run: |
          docker build -t scribble-${{ matrix.component }}:scan ./${{ matrix.component }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scribble-${{ matrix.component }}:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: "10m"

# STAGE 5: checkov - iac security scan - terraform + k8's

  iac-scan:
    name: "IaC security }:scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: run checkov on terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_39,CKV_AWS_58  # Public EKS endpoint (intentional for dev)
          output_format: cli

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true  # Soft fail for K8s (some checks may not apply)
          output_format: cli

# STAGE 6: Dockerfile lint (hadolint)

  dockerfile-lint:
    name: "Dockerfile lint"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

# STAGE 7: update k8s manifest with new image tag
# only runs on push to main not on PRs

  update-manifest:
    name: update K8s manifest
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update K8s manifest with new image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}

          # Find the line number of the backend container image
          # (the image: line right after `- name: backend`)
          BACKEND_LINE=$(awk '/- name: backend/{found=1} found && /image:/{print NR; exit}' k8s/scribble.yml)
          echo "Backend image at line: ${BACKEND_LINE}"
          sed -i "${BACKEND_LINE}s|.*| image: ${BACKEND_IMAGE}:${IMAGE_TAG}|" k8s/scribble.yml

          # Find the line number of the frontend container image
          # (the image: line right after `- name: frontend`)
          FRONTEND_LINE=$(awk '/- name: frontend/{found=1} found && /image:/{print NR; exit}' k8s/scribble.yml)
          echo "Frontend image at line: ${FRONTEND_LINE}"
          sed -i "${FRONTEND_LINE}s|.*| image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|" k8s/scribble.yml

          echo "Updated images to tag: ${IMAGE_TAG}"
          grep -n "image:" k8s/scribble.yml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/scribble.yml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
