services:

  db:
    image: postgres:16-alpine
    container_name: scribble-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scribble_user
      POSTGRES_PASSWORD: scribble_pass_2026
      POSTGRES_DB: scribble_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scribble_user -d scribble_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /tmp
      - /run

  # ---- Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scribble-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: scribble_user
      DB_PASSWORD: scribble_pass_2026
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: scribble_db
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    # Security: do not run as root (already in Dockerfile, but enforced here too)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scribble-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local